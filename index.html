<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lascivious Vibrations</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

.bg {
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at center, #111, #000);
  animation: pulse 10s infinite alternate;
  z-index:-1;
}

@keyframes pulse {
  0% { filter: brightness(1); }
  100% { filter: brightness(1.25); }
}

.hero {
  padding:60px 20px;
}

h1 { font-size:2.5rem; }

button {
  padding:10px 18px;
  margin:6px;
  border:1px solid white;
  background:none;
  color:white;
  cursor:pointer;
}

button:hover {
  background:white;
  color:black;
}

.box {
  margin:25px auto;
  padding:20px;
  max-width:700px;
  border:1px solid #333;
  min-height:120px;
}

.blurred {
  filter: blur(6px);
  user-select:none;
}

input {
  padding:10px;
  width:260px;
  margin:6px;
  border:none;
}

.small {
  font-size:0.8rem;
  opacity:0.7;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="bg"></div>

<div class="hero">
  <h1>BE THE CHANGE</h1>
  <p>Preview → Unlock → Create</p>
</div>
