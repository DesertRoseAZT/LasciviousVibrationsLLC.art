<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lascivious Vibrations</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>LASCIVIOUS VIBRATIONS</h1>

<div class="container">

<!-- DROP SELECT -->
<h3>Select Drop</h3>
<button onclick="setDrop('001')">001</button>
<button onclick="setDrop('002')">002</button>
<button onclick="setDrop('003')">003</button>
<button onclick="setDrop('004')">004</button>

<!-- GENERATOR -->
<h3>Prompt Generator</h3>
<button onclick="generatePrompt()">Generate</button>
<button onclick="remixPrompt()">Remix</button>
<button onclick="copyPrompt()">Copy</button>

<div id="promptBox" class="box"></div>

<!-- AUTOPILOT CONTENT -->
<h3>Autopilot Content</h3>
<button onclick="generateAuto()">Generate Content</button>

<div id="blog" class="box"></div>
<div id="pin" class="box"></div>
<div id="video" class="box"></div>

<!-- CTA -->
<h3>Unlock Full Drops</h3>
<a href="https://lasciviouscreator.gumroad.com/" target="_blank">
<button class="cta">Unlock Premium</button>
</a>

</div>

<script>

let currentDrop = "001";
let currentPrompt = "";

/* DROP DATA */
const drops = {
  "001": ["identity fracture","self realization","mirror consciousness"],
  "002": ["surveillance system","digital prison","data overload"],
  "003": ["history collapse","timeline merging","war memory"],
  "004": ["human unity","rebirth world","light reconstruction"]
};

const style = [
  "cinematic lighting",
  "volumetric fog",
  "ultra realistic",
  "dramatic shadows",
  "film still",
  "emotional atmosphere"
];

/* SET DROP */
function setDrop(d){
	  currentDrop = d;
	  generatePrompt();
	  generateAuto();
	}

/* GENERATE PROMPT */
function generatePrompt(){
  let base = drops[currentDrop][Math.floor(Math.random()*drops[currentDrop].length)];
  let s = style.sort(()=>0.5-Math.random()).slice(0,3);
  currentPrompt = base + ", " + s.join(", ");
  document.getElementById("promptBox").innerText = currentPrompt;
}

/* REMIX */
function remixPrompt(){
  currentPrompt += ", enhanced cinematic detail";
  document.getElementById("promptBox").innerText = currentPrompt;
}

/* COPY */
function copyPrompt(){
	  navigator.clipboard.writeText(currentPrompt).then(function() {
	    alert("Prompt copied to clipboard!");
	  }, function() {
	    alert("Failed to copy prompt.");
	  });
	}

/* AUTOPILOT CONTENT */
function generateAuto(){

  const blog = `
DROP ${currentDrop}

A cinematic exploration of human perception and reality.
This drop transforms emotion into visual storytelling through AI-driven prompts.
`;

  const pin = `
Cinematic AI prompts exploring Drop ${currentDrop}.
Dark aesthetic, emotional visuals, surreal storytelling.
`;

  const video = `
"This isn't just AI art..."

Drop ${currentDrop} creates cinematic experiences from emotion.
Watch reality transform into visuals.
`;

  document.getElementById("blog").innerText = blog;
  document.getElementById("pin").innerText = pin;
  document.getElementById("video").innerText = video;
}

generatePrompt();
	generateAuto();
	</script>

</body>
</html>
